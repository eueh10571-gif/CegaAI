<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT – Android</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1c1e;
    --surface: #22252a;
    --surface2: #2c2f35;
    --surface3: #363940;
    --primary: #19c37d;
    --primary-dim: #0f7a4e;
    --on-primary: #fff;
    --text: #e3e5e8;
    --text-dim: #9ca3af;
    --text-faint: #4b5260;
    --outline: #2f3238;
    --user-bubble: #1a4fa0;
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 8px;
    --font: 'Google Sans Text', 'Google Sans', sans-serif;
    --font-display: 'Google Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--font);
  }

  /* ── Phone shell ── */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    border: 2px solid #2a2d32;
    box-shadow:
      0 0 0 6px #111,
      0 0 0 7px #222,
      0 40px 80px rgba(0,0,0,.8),
      inset 0 1px 0 rgba(255,255,255,.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* side buttons */
  .phone::before {
    content: '';
    position: absolute;
    right: -8px;
    top: 120px;
    width: 4px;
    height: 60px;
    background: #222;
    border-radius: 0 3px 3px 0;
    box-shadow: 0 80px 0 #222, 0 150px 0 #222;
  }
  .phone::after {
    content: '';
    position: absolute;
    left: -8px;
    top: 160px;
    width: 4px;
    height: 40px;
    background: #222;
    border-radius: 3px 0 0 3px;
    box-shadow: 0 60px 0 #222;
  }

  /* ── Status bar ── */
  .status-bar {
    height: 44px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  .status-time {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg { color: var(--text); }

  /* Dynamic island */
  .island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    border: 1.5px solid #1a1a1a;
    z-index: 10;
  }

  /* ── App bar ── */
  .app-bar {
    height: 64px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--outline);
  }
  .app-bar-icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; color: var(--text);
    transition: background .2s;
  }
  .app-bar-icon-btn:hover { background: rgba(255,255,255,.08); }

  .app-bar-title-area { flex: 1; }
  .app-bar-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .app-bar-subtitle {
    font-size: 11px;
    color: var(--primary);
    font-weight: 500;
    letter-spacing: .4px;
    text-transform: uppercase;
  }

  .gpt-avatar {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Chat area ── */
  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  .chat-scroll::-webkit-scrollbar { width: 3px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px;
    text-align: center;
  }
  .empty-logo {
    width: 64px; height: 64px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 4px;
    box-shadow: 0 0 32px rgba(25,195,125,.3);
  }
  .empty-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.4px;
  }
  .empty-sub { font-size: 14px; color: var(--text-dim); line-height: 1.5; }

  .chips-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    margin-top: 12px;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--outline);
    border-radius: var(--radius-xl);
    padding: 11px 16px;
    font-size: 13.5px;
    color: var(--text-dim);
    cursor: pointer;
    text-align: left;
    transition: all .2s;
    font-family: var(--font);
  }
  .chip:hover { background: var(--surface3); color: var(--text); border-color: var(--primary); }

  /* ── Messages ── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }

  .bot-ava {
    width: 28px; height: 28px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    line-height: 1.6;
    font-size: 14.5px;
    word-break: break-word;
    white-space: pre-wrap;
    animation: popIn .2s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  .bubble.user {
    background: var(--user-bubble);
    color: #e8effc;
    border-radius: 22px 22px 5px 22px;
  }
  .bubble.bot {
    background: var(--surface2);
    color: var(--text);
    border-radius: 5px 22px 22px 22px;
    border: 1px solid var(--outline);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.92) translateY(6px); }
    to   { opacity: 1; transform: scale(1)  translateY(0);    }
  }

  /* Typing indicator */
  .typing-dots {
    display: flex; gap: 5px; align-items: center; padding: 14px 18px;
    background: var(--surface2);
    border-radius: 5px 22px 22px 22px;
    border: 1px solid var(--outline);
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: blink 1.3s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,60%,100%{opacity:.2} 30%{opacity:1} }

  /* ── Input bar ── */
  .input-area {
    padding: 10px 14px 10px;
    border-top: 1px solid var(--outline);
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface2);
    border-radius: 26px;
    border: 1.5px solid var(--outline);
    padding: 6px 6px 6px 16px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--primary); }

  .input-row textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14.5px;
    resize: none;
    line-height: 1.6;
    max-height: 100px;
    overflow-y: auto;
    padding: 5px 0;
  }
  .input-row textarea::placeholder { color: var(--text-faint); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }
  .send-btn.active { background: var(--primary); color: #000; }
  .send-btn.inactive { background: var(--surface3); color: var(--text-faint); cursor: default; }

  /* ── Nav bar ── */
  .nav-bar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .nav-pill {
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,.25);
    border-radius: 3px;
  }

  /* ── New chat FAB area ── */
  .new-chat-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--outline);
    color: var(--text-dim);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    transition: all .2s;
  }
  .new-chat-btn:hover { background: var(--surface2); color: var(--text); }
</style>
</head>
<body>

<div class="phone">
  <!-- Dynamic island -->
  <div class="island"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
        <rect x="0" y="7" width="3" height="5" rx="1" opacity=".4"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1" opacity=".6"/>
        <rect x="9" y="2.5" width="3" height="9.5" rx="1" opacity=".8"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1"/>
      </svg>
      <!-- Wifi -->
      <svg width="16" height="12" viewBox="0 0 24 18" fill="currentColor">
        <path d="M12 14a2 2 0 110 4 2 2 0 010-4z"/>
        <path d="M6.7 11.3a7.5 7.5 0 0110.6 0l1.5-1.5a9.7 9.7 0 00-13.6 0l1.5 1.5z" opacity=".6"/>
        <path d="M3.5 8.1a12 12 0 0117 0l1.5-1.5a14.2 14.2 0 00-20 0l1.5 1.5z" opacity=".3"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity=".35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/>
        <path d="M23 4v4a2 2 0 000-4z" fill="currentColor" opacity=".4"/>
      </svg>
    </div>
  </div>

  <!-- App bar -->
  <div class="app-bar">
    <button class="app-bar-icon-btn" id="menuBtn" onclick="toggleDrawer()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="gpt-avatar">
      <svg width="20" height="20" viewBox="0 0 41 41" fill="none">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.507-3.357 10.079 10.079 0 00-9.614 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.507 3.357 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.814z" fill="#000"/>
      </svg>
    </div>

    <div class="app-bar-title-area">
      <div class="app-bar-title">ChatGPT</div>
      <div class="app-bar-subtitle">GPT-5-mini</div>
    </div>

    <button class="new-chat-btn" onclick="newChat()" id="newChatBtn" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>

    <button class="app-bar-icon-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>

  <!-- Chat scroll -->
  <div class="chat-scroll" id="chatScroll">
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">
        <svg width="34" height="34" viewBox="0 0 41 41" fill="none">
          <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.507-3.357 10.079 10.079 0 00-9.614 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.507 3.357 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.814z" fill="#000"/>
        </svg>
      </div>
      <div class="empty-title">How can I help?</div>
      <div class="empty-sub">Powered by GPT‑5‑mini · Ask me anything</div>
      <div class="chips-row">
        <button class="chip" onclick="useChip(this)">🔢 What's 347 × 89?</button>
        <button class="chip" onclick="useChip(this)">🧩 Give me a tricky riddle</button>
        <button class="chip" onclick="useChip(this)">⚛️ Explain quantum entanglement simply</button>
        <button class="chip" onclick="useChip(this)">🌌 What's the meaning of life?</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="Message ChatGPT…"
        oninput="onInput(this)"
        onkeydown="onKey(event)"></textarea>
      <button class="send-btn inactive" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4l8 8H14v8h-4v-8H4z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Home nav bar -->
  <div class="nav-bar"><div class="nav-pill"></div></div>
</div>

<script>
const SYSTEM_PROMPT = `You're ChatGPT, a large language model based on the GPT-5-mini model and trained by OpenAI.
Current date: 2026-03-16

Personality: v2
Supportive thoroughness: Patiently explain complex topics clearly and comprehensively.
Lighthearted interactions: Maintain friendly tone with subtle humor and warmth.
Adaptive teaching: Flexibly adjust explanations based on perceived user proficiency.
Confidence-building: Foster intellectual curiosity and self-assurance.

For any riddle, trick question, bias test, or test of assumptions: pay close, skeptical attention to the exact wording. Second-guess 'classic' riddles. For ANY arithmetic, calculate digit by digit before answering — never rely on memorized answers.

Do not end with opt-in questions or hedging closers. Do not say: would you like me to; want me to do that; let me know if you would like me to; should I; shall I. If the next step is obvious, do it.`;

let messages = [];
let loading = false;

// Live clock
function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent =
    `${h % 12 || 12}:${String(m).padStart(2,'0')}`;
}
updateClock();
setInterval(updateClock, 10000);

function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const btn = document.getElementById('sendBtn');
  if (el.value.trim()) {
    btn.className = 'send-btn active';
  } else {
    btn.className = 'send-btn inactive';
  }
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function useChip(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, '');
  document.getElementById('msgInput').value = text;
  onInput(document.getElementById('msgInput'));
  sendMessage();
}

function newChat() {
  messages = [];
  document.getElementById('chatScroll').innerHTML = '';
  document.getElementById('chatScroll').appendChild(buildEmptyState());
  document.getElementById('newChatBtn').style.display = 'none';
}

function buildEmptyState() {
  const d = document.createElement('div');
  d.className = 'empty-state';
  d.id = 'emptyState';
  d.innerHTML = `
    <div class="empty-logo">
      <svg width="34" height="34" viewBox="0 0 41 41" fill="none">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.507-3.357 10.079 10.079 0 00-9.614 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.507 3.357 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.814z" fill="#000"/>
      </svg>
    </div>
    <div class="empty-title">How can I help?</div>
    <div class="empty-sub">Powered by GPT‑5‑mini · Ask me anything</div>
    <div class="chips-row">
      <button class="chip" onclick="useChip(this)">🔢 What's 347 × 89?</button>
      <button class="chip" onclick="useChip(this)">🧩 Give me a tricky riddle</button>
      <button class="chip" onclick="useChip(this)">⚛️ Explain quantum entanglement simply</button>
      <button class="chip" onclick="useChip(this)">🌌 What's the meaning of life?</button>
    </div>`;
  return d;
}

function toggleDrawer() {
  // placeholder ripple effect on button
  const btn = document.getElementById('menuBtn');
  btn.style.background = 'rgba(255,255,255,.12)';
  setTimeout(() => btn.style.background = '', 300);
}

function addBubble(role, text) {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  document.getElementById('newChatBtn').style.display = 'inline-flex';

  const scroll = document.getElementById('chatScroll');
  const row = document.createElement('div');
  row.className = `msg-row ${role === 'user' ? 'user' : 'bot'}`;

  if (role === 'assistant') {
    row.innerHTML = `
      <div class="bot-ava">
        <svg width="15" height="15" viewBox="0 0 41 41" fill="none">
          <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.507-3.357 10.079 10.079 0 00-9.614 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.507 3.357 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.814z" fill="#000"/>
        </svg>
      </div>
      <div class="bubble bot">${escapeHtml(text)}</div>`;
  } else {
    row.innerHTML = `<div class="bubble user">${escapeHtml(text)}</div>`;
  }

  scroll.appendChild(row);
  scroll.scrollTop = scroll.scrollHeight;
  return row;
}

function addTyping() {
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  const scroll = document.getElementById('chatScroll');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="bot-ava">
      <svg width="15" height="15" viewBox="0 0 41 41" fill="none">
        <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.507-3.357 10.079 10.079 0 00-9.614 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.507 3.357 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.243-11.814z" fill="#000"/>
      </svg>
    </div>
    <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  scroll.appendChild(row);
  scroll.scrollTop = scroll.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || loading) return;

  loading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').className = 'send-btn inactive';

  const userMsg = { role: 'user', content: text };
  messages.push(userMsg);
  addBubble('user', text);
  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages,
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response.';
    messages.push({ role: 'assistant', content: reply });
    removeTyping();
    addBubble('assistant', reply);
  } catch(e) {
    removeTyping();
    addBubble('assistant', '⚠️ Something went wrong. Please try again.');
  } finally {
    loading = false;
  }
}
</script>
</body>
</html>
